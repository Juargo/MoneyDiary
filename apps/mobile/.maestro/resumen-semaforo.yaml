# Flujo E2E (Maestro · ADR-017) — Resumen 50/30/20 con semáforo.
#
# Camino crítico: el usuario ve la distribución mensual (US-015) y el estado
# del semáforo verde/amarillo/rojo por bucket (US-016). Una sola pantalla,
# sin login ni navegación — `runFlow: login.yaml` y `tapOn: "Resumen"` eran
# pasos muertos y se removieron en PR 2 (T2 scaffold, sprint3-mvp-mobile).
#
# Flujo autocontenido (T3.12, sprint3-mvp-mobile): `launchApp` renderiza la
# única ruta (`app/index.tsx`), que hace fetch y muestra el estado "data"
# real implementado en PR 3b. Las assertions anclan en el texto/testID que
# renderiza `ResumenScreen`. Requiere un dev build apuntando a la API real
# (`EXPO_PUBLIC_*`) con ingresos en el período — device-gated, no CI (T3.13).
appId: cl.moneydiary.app
---
- launchApp
- assertVisible: "Distribución 50/30/20"
- assertVisible: "Necesidades"
- assertVisible: "Deseos"
- assertVisible: "Ahorro"
# El indicador de estado global del semáforo debe estar presente.
- assertVisible:
    id: "semaforo-global"
