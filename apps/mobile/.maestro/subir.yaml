# Flujo E2E (Maestro · ADR-017) — Subir cartola desde mobile (US-033, ADR-026).
#
# Camino crítico: el usuario autenticado abre "Subir cartola" desde la
# pantalla de resumen, selecciona un archivo .xlsx/.pdf real vía el picker
# nativo del sistema operativo, confirma, y ve el resumen del resultado
# (banco/cuenta/totalTransacciones). Este es el gate REQUERIDO para la
# correctitud del boundary multipart en dispositivo real que jest-expo NO
# puede validar (design.md, riesgo HIGH marcado explícitamente) — debe
# correrse en un dispositivo/simulador real antes de mergear el Work Unit B,
# no en CI.
#
# Requiere una sesión ya iniciada (mismo patrón que ver-movimientos.yaml:
# correr login.yaml antes, o encadenar con runFlow) y un archivo fixture
# .xlsx o .pdf válido ya accesible desde el picker nativo del dispositivo
# (por ejemplo, precargado en Files/Descargas del simulador — el picker del
# SO no es scriptable de forma determinística más allá de tocar el nombre
# del archivo visible).
appId: cl.moneydiary.app
---
- launchApp
- runFlow: login.yaml
- tapOn: "Subir cartola"
# El trigger abre el picker nativo (`expo-document-picker`, filtrado a
# .xlsx/.pdf — CU-08). Ajustar el texto/selector del archivo fixture al
# nombre real precargado en el dispositivo de prueba antes de correr.
- tapOn: "Seleccionar archivo"
- tapOn: "cartola-test.xlsx"
# El estado "subiendo" deshabilita el trigger mientras la subida está en
# curso (CU-09) — esperar el resultado con margen generoso (red real +
# cold-start del backend gratuito, mismo criterio que resumen-semaforo.yaml).
- extendedWaitUntil:
    visible: "Cartola subida"
    timeout: 40000
# El resumen del resultado debe mostrar banco/cuenta/totalTransacciones
# (CU-10) — el resultado real depende del contenido del fixture usado.
- assertVisible:
    id: "subir-resultado"
