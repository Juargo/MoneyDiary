# Flujo E2E (Maestro · ADR-017) — Login.
#
# Requiere un development build de la app corriendo en simulador/emulador o
# dispositivo físico (ADR-010). Ejecutar: maestro test .maestro/login.yaml
#
# `appId` es un placeholder — fijar el bundle id real al scaffoldear la app.
appId: cl.moneydiary.app
---
- launchApp
- assertVisible: "Iniciar sesión"
- tapOn: "Correo"
- inputText: "demo@moneydiary.cl"
- tapOn: "Contraseña"
- inputText: "demo1234"
- tapOn: "Ingresar"
- assertVisible: "Movimientos"
