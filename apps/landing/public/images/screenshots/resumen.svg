<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 640" fill="none">
  <!-- Phone frame bg -->
  <rect width="360" height="640" rx="20" fill="#f5f5f5"/>
  <!-- Status bar -->
  <rect x="0" y="0" width="360" height="44" fill="#475f85"/>
  <circle cx="300" cy="22" r="6" fill="#8fa7d1"/>
  <circle cx="320" cy="22" r="6" fill="#8fa7d1"/>
  <circle cx="340" cy="22" r="6" fill="#8fa7d1"/>
  <!-- Header -->
  <text x="24" y="80" fill="#1a1c1c" font-family="Inter, system-ui, sans-serif" font-weight="700" font-size="24">Semáforo</text>
  <text x="24" y="100" fill="#74777f" font-family="Inter, system-ui, sans-serif" font-size="12">Julio 2026 · Cerrado</text>
  <!-- Traffic light card -->
  <rect x="20" y="116" width="320" height="180" rx="16" fill="white" stroke="#e2e2e2" stroke-width="1"/>
  <!-- Green light -->
  <circle cx="90" cy="160" r="20" fill="#27ae60" opacity="0.2"/>
  <circle cx="90" cy="160" r="14" fill="#27ae60"/>
  <text x="66" y="164" fill="white" font-family="Inter, system-ui, sans-serif" font-weight="700" font-size="11" text-anchor="middle">50%</text>
  <!-- Yellow light -->
  <circle cx="180" cy="160" r="20" fill="#f39c12" opacity="0.2"/>
  <circle cx="180" cy="160" r="14" fill="#f39c12"/>
  <text x="156" y="164" fill="white" font-family="Inter, system-ui, sans-serif" font-weight="700" font-size="11" text-anchor="middle">30%</text>
  <!-- Red light -->
  <circle cx="270" cy="160" r="20" fill="#e74c3c" opacity="0.2"/>
  <circle cx="270" cy="160" r="14" fill="#e74c3c"/>
  <text x="246" y="164" fill="white" font-family="Inter, system-ui, sans-serif" font-weight="700" font-size="11" text-anchor="middle">20%</text>
  <!-- Labels -->
  <text x="90" y="196" text-anchor="middle" fill="#27ae60" font-family="Inter, system-ui, sans-serif" font-weight="600" font-size="13">Necesidades</text>
  <text x="180" y="196" text-anchor="middle" fill="#f39c12" font-family="Inter, system-ui, sans-serif" font-weight="600" font-size="13">Deseos</text>
  <text x="270" y="196" text-anchor="middle" fill="#e74c3c" font-family="Inter, system-ui, sans-serif" font-weight="600" font-size="13">Ahorro</text>
  <!-- Status text -->
  <text x="180" y="230" text-anchor="middle" fill="#27ae60" font-family="Inter, system-ui, sans-serif" font-weight="700" font-size="14">✓ Vas por buen camino</text>
  <text x="180" y="252" text-anchor="middle" fill="#74777f" font-family="Inter, system-ui, sans-serif" font-size="11">Tus gastos están dentro de los rangos recomendados</text>
  <!-- Donut chart area -->
  <rect x="20" y="312" width="320" height="136" rx="12" fill="white" stroke="#e2e2e2" stroke-width="1"/>
  <text x="36" y="340" fill="#1a1c1c" font-family="Inter, system-ui, sans-serif" font-weight="600" font-size="16">Distribución por banco</text>
  <!-- Donut -->
  <circle cx="90" cy="384" r="36" fill="none" stroke="#8fa7d1" stroke-width="16" stroke-dasharray="140 86" transform="rotate(-90 90 384)"/>
  <circle cx="90" cy="384" r="36" fill="none" stroke="#b1a7d1" stroke-width="16" stroke-dasharray="86 140" transform="rotate(-90 90 384)" stroke-dashoffset="-140"/>
  <text x="90" y="388" text-anchor="middle" fill="#1a1c1c" font-family="Inter, system-ui, sans-serif" font-weight="700" font-size="12">$1.25M</text>
  <!-- Legend -->
  <circle cx="160" cy="368" r="5" fill="#8fa7d1"/>
  <text x="172" y="372" fill="#74777f" font-family="Inter, system-ui, sans-serif" font-size="12">BancoEstado</text>
  <circle cx="160" cy="392" r="5" fill="#b1a7d1"/>
  <text x="172" y="396" fill="#74777f" font-family="Inter, system-ui, sans-serif" font-size="12">BCI</text>
  <text x="160" y="418" fill="#74777f" font-family="Inter, system-ui, sans-serif" font-size="11">+ 2 bancos más</text>
  <!-- Monthly trend -->
  <rect x="20" y="464" width="320" height="120" rx="12" fill="white" stroke="#e2e2e2" stroke-width="1"/>
  <text x="36" y="492" fill="#1a1c1c" font-family="Inter, system-ui, sans-serif" font-weight="600" font-size="16">Tendencia mensual</text>
  <!-- Mini bar chart -->
  <rect x="36" y="508" width="28" height="48" rx="4" fill="#8fa7d1" opacity="0.5"/>
  <rect x="72" y="524" width="28" height="32" rx="4" fill="#8fa7d1" opacity="0.5"/>
  <rect x="108" y="516" width="28" height="40" rx="4" fill="#8fa7d1" opacity="0.5"/>
  <rect x="144" y="504" width="28" height="52" rx="4" fill="#8fa7d1" opacity="0.5"/>
  <rect x="180" y="500" width="28" height="56" rx="4" fill="#8fa7d1"/>
  <text x="194" y="572" text-anchor="middle" fill="#475f85" font-family="Inter, system-ui, sans-serif" font-size="10">Jul</text>
  <!-- Bottom nav -->
  <rect x="0" y="596" width="360" height="44" fill="white" stroke="#e2e2e2" stroke-width="1"/>
  <circle cx="60" cy="618" r="4" fill="#e2e2e2"/>
  <circle cx="180" cy="618" r="4" fill="#e2e2e2"/>
  <circle cx="300" cy="618" r="4" fill="#475f85"/>
</svg>
