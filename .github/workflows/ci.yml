name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Typecheck & unit tests
    runs-on: ubuntu-latest
    env:
      # Dummy URLs so prisma.config.ts loads without a real database — its
      # env() calls throw when the variable is missing, so BOTH must be set.
      # No CI step connects to a database (see note on test:integration below).
      DATABASE_URL: postgresql://ci:ci@localhost:5432/ci
      DIRECT_URL: postgresql://ci:ci@localhost:5432/ci
    steps:
      - uses: actions/checkout@v4

      # Reads the pnpm version from package.json > packageManager
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      # Build scripts run only for packages allowlisted in
      # pnpm-workspace.yaml > allowBuilds; everything else is skipped.
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # @prisma/client is not in the allowBuilds allowlist, so its client
      # is never generated on install — generate it explicitly before
      # typechecking or testing the API.
      - name: Generate Prisma client
        run: pnpm api exec prisma generate

      - name: Typecheck API
        run: pnpm api exec tsc --noEmit

      # Vitest detecta CI automáticamente vía la env var CI (la setea GitHub
      # Actions) — no necesita un flag equivalente al `--ci` de Jest.
      - name: Unit tests API
        run: pnpm api test

      - name: Typecheck web
        run: pnpm web typecheck

      - name: Unit tests web
        run: pnpm web test

      # Needed so `apps/web/dist/` exists for the secret-scan step below.
      - name: Build web
        run: pnpm web build

      # Fail-closed guard for the `apps/web` secret boundary (Tarea 0-W):
      # the API key must be injected server-side only (Vite dev proxy /
      # Vercel function), never bundled into client code.
      - name: Web secret-scan (fail on bundled API key)
        run: |
          ! grep -rEni 'VITE_.*(KEY|SECRET|TOKEN)' apps/web/src
          test -d apps/web/dist
          ! grep -rEn 'x-api-key' apps/web/dist

      # NOT run in CI (manual/local gate for now):
      #   pnpm api test:integration — requires a real Supabase database and
      #   sets ALLOW_DESTRUCTIVE_DB=1; run it locally before merging
      #   persistence changes.

  landing:
    name: Typecheck & build landing
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Typecheck landing
        run: pnpm landing exec astro check
      - name: Build landing
        run: pnpm landing build

      # Scan the production bundle for leaked secrets. If any of these patterns
      # appear in the static output, the build is compromised — fail the job.
      - name: Secret grep
        run: '! grep -rE "(API_KEY|DATABASE_URL|-----BEGIN)" apps/landing/dist/ -q || { echo "Secret found in bundle!"; exit 1; }'

      # Smoke test: serve the built dist/ locally and verify 200.
      # Header-specific assertions (CSP, HSTS, nosniff) are NOT tested here —
      # Vercel applies those at the edge from vercel.json, so they only appear
      # on a real Vercel deployment (preview or production).
      - name: Smoke test
        run: |
          cd apps/landing/dist/ && python3 -m http.server 8787 &
          SERVER_PID=$!
          sleep 2
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8787/)
          kill $SERVER_PID 2>/dev/null || true
          [ "$STATUS" = "200" ] || { echo "Smoke test failed: got $STATUS"; exit 1; }

      # DEPLOYED (deferred — requires LHCI token setup):
      #   - Lighthouse CI (perf >=90, a11y >=95) via @lhci/cli
      #   - axe-core a11y audit via @axe-core/cli
      # These require a Vercel preview URL and LHCI token configured in GitHub
      # secrets. Enable when the deployment pipeline is in place.
      # Relevant env vars: LHCI_GITHUB_APP_TOKEN, VERCEL_PREVIEW_URL
