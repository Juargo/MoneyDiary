# openspec/config.yaml
schema: spec-driven
project: MoneyDiary

context: |
  Chilean personal-finance app: ingests bank .xlsx into a canonical transaction schema.
  Stack: pnpm@11 monorepo (Node 22+). apps/api = NestJS 11 + TS strict + Prisma 7 + PostgreSQL/Supabase + ExcelJS. apps/web = React 19 + Vite 8 + Tailwind 4 + shadcn/ui + TanStack Query/Router + Zustand. apps/mobile = Expo SDK 57 + Expo Router + NativeWind 4 (tailwindcss@3 mandatory) (ADR-010).
  Production: apps/api deployed on Render (https://moneydiary-api.onrender.com) behind a global fail-closed ApiKeyGuard (x-api-key); Supabase reached via IPv4 pooler (direct IPv6 fails on Render).
  Architecture: Modular Monolith + Clean Architecture (ADR-005). Dependency direction domain <- application <- infrastructure. Never throw in domain/application; return Result<T,E> (apps/api/src/shared/result.ts).
  Conventions: domain/application named in Spanish (VOs, errors, use cases); NestJS infra in English (controllers, modules, adapters). Files kebab-case.ts, classes PascalCase. Build new use cases domain -> application -> infrastructure.
  Frontend/mobile never import apps/api domain; HTTP DTO types are hand-written (apps/web/src/api/types.ts, apps/mobile/src/domain/resumen.types.ts) (ADR-008). Money crosses HTTP as BigInt-safe strings — never parseFloat amounts.
  Style: Conventional Commits, no AI attribution.

# Strict TDD applies to apps/api, apps/web and apps/mobile domain/screens (ADR-016/017).
strict_tdd: true

testing:
  strict_tdd: true
  canonical_test_command: pnpm api test
  workspaces:
    api:
      test: pnpm api test                # vitest run (ADR-016; SWC transpile for Nest decorator metadata)
      test_single_name: pnpm api test -- -t "name"
      test_single_file: pnpm api test -- path/to.spec.ts
      e2e: pnpm api test:e2e             # vitest.e2e.config.ts — mutates real DB, gated by ALLOW_DESTRUCTIVE_DB=1
      coverage: pnpm api test:cov
      typecheck: pnpm api exec tsc --noEmit
      lint: pnpm api lint                # eslint --fix
      format: pnpm api format            # prettier
      runner: vitest (ADR-016)
      has_test_runner: true
    web:
      test: pnpm web test                # vitest run (jsdom + Testing Library, ADR-016)
      typecheck: pnpm web typecheck      # runs `tsr generate` then tsc -b (must regen routes first)
      lint: pnpm web lint                # eslint
      build: pnpm web build              # tsr generate && tsc -b && vite build
      runner: vitest (jsdom)
      has_test_runner: true
    mobile:
      test: pnpm --filter @moneydiary/mobile test   # jest-expo 57 (pins jest@29) + RNTL (ADR-017)
      runner: jest-expo + RNTL (Maestro E2E manual on device, not CI)
      has_test_runner: true
    all:
      test: pnpm test                    # pnpm -r test (api + web + mobile)
      build: pnpm build
      lint: pnpm lint

rules:
  proposal:
    - Include rollback plan for risky changes (DB migrations, ingesta pipeline).
    - Reference relevant ADRs (001-008) when a decision touches an existing one.
  specs:
    - Use Given/When/Then for scenarios.
    - Use RFC 2119 keywords (MUST, SHALL, SHOULD, MAY).
  design:
    - Respect Clean Architecture direction domain <- application <- infrastructure.
    - Domain/application errors via Result<T,E>; never throw there.
    - New backend use case ordering: domain -> application (ports + use case) -> infrastructure.
    - Excel parsing: ExcelJS .xlsx only (ADR-007); read cells via cell.text, not String(cell.value).
  tasks:
    - Group by Clean Architecture layer, use hierarchical numbering.
    - Keep tasks completable in one session.
  apply:
    - Follow existing patterns; Spanish domain/application, English NestJS infra, kebab-case.ts files.
    - Apply the project skills in .claude/skills/ (solid, dry, kiss, yagni) when writing and reviewing code; their checklists complement the ADR-015 security checklist.
    - Frontend DTO types are hand-written in apps/web/src/api/types.ts; do not import api domain.
    - Ignore iCloud duplicate files named "... 2.ts" / "... 2.json".
    tdd: true                            # RED-GREEN-REFACTOR in api, web and mobile domain/screens
    test_command: pnpm api test
  verify:
    test_command: pnpm api test
    e2e_command: pnpm api test:e2e
    typecheck_command: pnpm api exec tsc --noEmit
    web_typecheck_command: pnpm web typecheck
    build_command: pnpm build
    coverage_threshold: 0
  archive:
    - Warn before merging destructive deltas.

notable_gotchas:
  - "@types/node pinned to ^22 in apps/api — do NOT bump to 24 (breaks ExcelJS types)."
  - "Prisma 7: do NOT add earlyAccess: true (stable types reject it). Needs apps/api/.env with DATABASE_URL + DIRECT_URL (Supabase pooler)."
  - "apps/web/src/routeTree.gen.ts is generated by `tsr generate` and gitignored — run typecheck/build to create it before TS passes."
  - ".npmrc enforces minimum-release-age=10080 (7-day quarantine) + audit-level=high; fresh deps may be refused."
  - "pnpm isolated resolution: each apps/* must declare its direct deps explicitly."
  - "Clean install needs `pnpm approve-builds` (allowBuilds: nestjs/core, prisma engines, swc/core, prisma, unrs-resolver)."
  - "Files named '... 2.ts' / '... 2.json' are iCloud sync duplicates — ignore, never edit."
  - "CI: .github/workflows/ci.yml runs prisma generate -> api typecheck -> api unit tests -> web typecheck on every PR. test:integration/test:e2e are NOT in CI (need real DB + ALLOW_DESTRUCTIVE_DB=1) — run locally before merging persistence changes."
  - "NativeWind 4 hard-requires tailwindcss@3 (v4 support only in nativewind 5 preview) — do not bump apps/mobile tailwindcss to 4."
  - "jest-expo 57 pins jest@29 in apps/mobile — do not bump to jest@30."
  - "Production secrets (API_KEY/DATABASE_URL/DIRECT_URL) live in Render dashboard (sync:false); mobile key via EAS Secrets, never in the bundle."
