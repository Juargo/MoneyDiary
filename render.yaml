# render.yaml — Blueprint de despliegue del backend MoneyDiary (ADR-004).
#
# Despliega apps/api (NestJS) como Web Service en Render, apuntando a la BD
# Supabase (ADR-002). El frontend web/mobile NO se despliegan aquí.
#
# Cómo usarlo:
#   1. En Render → New → Blueprint → conectar el repo Juargo/MoneyDiary.
#   2. Render lee este archivo y crea el servicio.
#   3. Setear los secretos (sync:false) en el dashboard: DATABASE_URL,
#      DIRECT_URL, API_KEY (ver notas abajo).
#
# Seguridad: los 3 secretos van con `sync:false` — NO se commitean; se cargan
# a mano en el dashboard de Render. API_KEY protege todos los endpoints salvo
# el health check (ApiKeyGuard, fail-closed).

services:
  - type: web
    name: moneydiary-api
    runtime: node
    region: oregon
    plan: free
    branch: main
    # El repo es un monorepo pnpm; se instala y construye desde la raíz.
    rootDir: .
    # `rm -rf apps/api/dist` runs after Render restores its build cache and
    # before nest build: it guarantees the deployed dist is exactly what THIS
    # build compiled, never a stale/partial dist left in the cache by a prior
    # (possibly failed) build. A cached dist once shipped without a new route
    # despite the source being correct — this makes the output cache-proof.
    buildCommand: >-
      corepack enable &&
      pnpm install --frozen-lockfile &&
      rm -rf apps/api/dist &&
      pnpm --filter @moneydiary/api exec prisma generate &&
      pnpm --filter @moneydiary/api build
    startCommand: pnpm --filter @moneydiary/api start:prod
    # Health check público (AppController @Public) — sin API key.
    healthCheckPath: /
    envVars:
      - key: NODE_VERSION
        value: "22.22.3"
      # Pooler transaction-mode (IPv4) de Supabase — la app en runtime.
      - key: DATABASE_URL
        sync: false
      # Pooler session-mode — migraciones (Prisma).
      - key: DIRECT_URL
        sync: false
      # API key del ApiKeyGuard. Generar con:
      #   node -e "console.log(require('crypto').randomBytes(32).toString('hex'))"
      - key: API_KEY
        sync: false
      # Fuerza el flag `Secure` en la cookie de sesión en producción sin
      # depender de que Render setee NODE_ENV=production implícitamente
      # (ver cookie.ts → shouldBeSecure). Es un valor no secreto.
      - key: COOKIE_SECURE
        value: "true"
      # Rate limiter de login (AUTH-08) — valores por defecto explícitos.
      # El parseo es fail-closed: si alguno queda vacío/no-numérico/≤0, la
      # API no arranca (ver login-rate-limiter.ts → readRateLimitConfigFromEnv).
      - key: LOGIN_RATELIMIT_MAX_EMAIL
        value: "5"
      - key: LOGIN_RATELIMIT_MAX_IP
        value: "20"
      - key: LOGIN_RATELIMIT_WINDOW_MS
        value: "900000"
